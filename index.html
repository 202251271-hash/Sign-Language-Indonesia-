<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SIBI - Indonesian Alphabet Sign Language</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #0b1c26;
  --bg-deep: #091722;
  --fg: #f2f2f2;
  --muted: #c2c9d1;
  --accent: #f7c873;
  --card: #0e2331;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: "Manrope", sans-serif;
  overflow-y: auto;
}

.page {
  min-height: 100vh;
  background: radial-gradient(1200px 600px at 70% -10%, rgba(90, 110, 120, 0.45), transparent 60%),
    linear-gradient(180deg, #2e3f49 0%, #0b1c26 45%, #08141e 100%);
}

.hero {
  position: relative;
  min-height: 100vh;
  overflow: hidden;
  padding-bottom: 48px;
}

.hero__bg {
  position: absolute;
  inset: 0;
  background-image: url("assets/hero.png");
  background-size: cover;
  background-position: center;
  filter: saturate(0.9) contrast(1.05);
  transform: scale(1.02);
}

.hero__overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(11, 28, 38, 0.3) 0%, rgba(11, 28, 38, 0.8) 75%, rgba(11, 28, 38, 1) 100%);
}

.hero__content {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 80px auto 0;
  text-align: center;
  padding: 0 20px;
}

.eyebrow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.3em;
  font-size: 12px;
}

.eyebrow .line {
  width: 60px;
  height: 1px;
  background: var(--accent);
}

.hero h1 {
  font-family: "Cormorant Garamond", serif;
  font-weight: 600;
  font-size: clamp(22px, 2.6vw, 38px);
  line-height: 1.15;
  margin: 18px 0 22px;
  white-space: nowrap;
  display: inline-block;
}

.scroll {
  color: var(--fg);
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 0.12em;
}

.camera-card {
  margin: 28px auto 0;
  max-width: 880px;
  background: rgba(14, 35, 49, 0.78);
  border: 1px solid rgba(247, 200, 115, 0.15);
  border-radius: 18px;
  padding: 18px;
  backdrop-filter: blur(8px);
  text-align: left;
}

.camera-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.camera-row input,
.camera-row button {
  border-radius: 12px;
  border: 1px solid rgba(247, 200, 115, 0.22);
  background: rgba(11, 28, 38, 0.7);
  color: var(--fg);
  padding: 10px 12px;
  font-size: 14px;
}

.camera-row input {
  flex: 1;
  min-width: 220px;
}

.camera-row button {
  cursor: pointer;
  background: rgba(22, 58, 74, 0.8);
}

.camera-row button.primary {
  background: rgba(52, 134, 95, 0.9);
  border-color: rgba(112, 196, 150, 0.7);
}

.camera-video {
  width: 100%;
  max-height: 56vh;
  object-fit: cover;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: #060a14;
  display: block;
}

.camera-status {
  margin-top: 12px;
  font-size: 14px;
  color: var(--accent);
}

.camera-phrase {
  margin-top: 6px;
  font-size: 22px;
  color: var(--fg);
  font-weight: 600;
}

@media (max-width: 720px) {
  .hero {
    min-height: 860px;
  }
  .hero__content {
    margin-top: 90px;
    padding: 0 16px;
  }
  .hero h1 {
    white-space: normal;
    font-size: clamp(24px, 5vw, 34px);
  }
}
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero__bg" aria-hidden="true"></div>
      <div class="hero__overlay" aria-hidden="true"></div>
      <nav class="nav"></nav>

      <div class="hero__content">
        <div class="eyebrow">
          <span class="line"></span>
          <span>welcome</span>
          <span class="line"></span>
        </div>
        <h1>Indonesian Alphabet Sign Language Camera-Based Translation Platform</h1>

        <section class="camera-card" aria-label="SIBI camera detector">
          <div class="camera-row">
            <input id="apiUrl" value="/predict" />
            <button id="startBtn" class="primary">Start Kamera</button>
            <button id="switchBtn">Switch Camera</button>
            <button id="stopBtn">Stop</button>
          </div>

          <video id="video" class="camera-video" autoplay playsinline muted></video>
          <canvas id="canvas" style="display:none"></canvas>

          <div class="camera-status">Status: <span id="status">idle</span></div>
          <div class="camera-phrase" id="phrase">-</div>
        </section>
      </div>
    </header>
  </div>

  <script src="./app.js"></script>
</body>
</html>
